name: Update AltStore Repo
permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'run' to confirm manual trigger"
        required: true
        default: ""

concurrency:
  group: altstore-update
  cancel-in-progress: false   # don't cancel a running job if triggered again

jobs:
  update:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'run')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RATE_LIMIT_PER_SECOND: "2"   # max 2 requests/sec = ~120/min, well under 5000/hr
        run: python githubScrape.py

      - name: Check for changes
        id: git_status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-update AltStore repo"
          git push
